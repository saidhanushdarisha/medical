<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hospitals - QuickCare</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f9ff;
      margin: 0;
      padding: 0;
    }

    nav {
      background-color: #007bff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
    }

    .brand {
      font-size: 1.5rem;
      font-weight: bold;
      color: white;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      margin: 0 1rem;
      font-weight: 500;
    }

    .logout {
      color: white;
      text-decoration: none;
      margin-left: 1rem;
      font-weight: 500;
      background-color: #FF0000;
      padding: 0.4rem 0.8rem;
      border-radius: 5px;
      transition: font-weight 0.2s, background-color 0.3s;
    }

    .logout:hover {
      font-weight: 700;
      background-color: #cc0000;
    }

    .container {
      max-width: 900px;
      margin: 2rem auto;
      padding: 1rem;
    }

    .hospital-card {
      background-color: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
      padding: 20px;
      margin-bottom: 20px;
    }

    .hospital-card h3 {
      color: #007bff;
      margin-top: 0;
    }

    .hospital-card p {
      margin: 5px 0;
    }

    .hospital-actions {
      margin-top: 15px;
    }

    .hospital-actions button {
      margin-right: 10px;
      padding: 8px 14px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      color: white;
    }

    .btn-ambulance { background-color: #dc3545; }
    .btn-medicine { background-color: #28a745; }
  </style>
</head>
<body>

  <!-- ✅ Same Navbar Style as Home Page -->
  <nav>
    <div class="brand">QuickCare</div>
    <div class="nav-links">
      <a th:href="@{/getHospitals}">Hospitals</a>
      <a th:href="@{/getDoctors}">Doctors</a>
      <a th:href="@{/opbooking}">OP Booking</a>
      <a th:href="@{/Ambulance}">Ambulance</a>
      <a th:href="@{/Medicines}">Medicines</a>
      <a th:href="@{/ordersHistory}">Tracking</a>
      <a th:href="@{/logout}" class="logout">Logout</a>
    </div>
  </nav>

  <div class="container">
    <h2 style="text-align: center; color: #007BFF;">🏥 Available Hospitals</h2>

    <div th:each="hospital : ${hospitals}" class="hospital-card">
      <h3 th:text="${hospital.hospital_name}">Hospital Name</h3>
      <p><strong>Address:</strong> <span th:text="${hospital.hospital_address}">Address</span></p>
      <p><strong>Phone:</strong> <span th:text="${hospital.hospital_phone}">Phone</span></p>
      <p><strong>Availability:</strong> <span th:text="${hospital.hospital_availability}">24x7</span></p>
      <p><strong>Facilities:</strong> <span th:text="${hospital.hospital_facilities}">Facilities</span></p>

      <div class="hospital-actions">
        <button class="btn-ambulance" th:onclick="'location.href=\'/Ambulance\''">🚑 Book Ambulance</button>
        <button class="btn-medicine" th:onclick="'location.href=\'/Medicines\''">💊 Order Medicines</button>
      </div>
    </div>
  </div>

</body>
</html>
