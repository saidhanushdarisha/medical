<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Hospitals List - Admin</title>
  <style>
      body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: radial-gradient(circle, #0d1f3c 0%, #020f1e 100%);
        color: white;
      }
      nav {
        background-color: #007bff;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 2rem;
      }
      nav .brand {
        font-size: 1.5rem;
        font-weight: bold;
      }
      nav .nav-links a, .logout {
        color: white;
        text-decoration: none;
        margin-left: 1rem;
        font-weight: 500;
      }
      .logout {
        background-color: #FF0000;
        padding: 0.4rem 0.8rem;
        border-radius: 5px;
      }
      .main-content {
        padding: 40px 20px;
      }
      h2 {
        text-align: center;
        color: #00cfff;
        margin-bottom: 30px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background-color: white;
        color: black;
        margin-top: 20px;
        border-radius: 5px;
        overflow: hidden;
      }
      th, td {
        padding: 12px 15px;
        text-align: left;
        border-bottom: 1px solid #ddd;
      }
      th {
        background-color: #007bff;
        color: white;
      }
      tr:hover {
        background-color: #f1f1f1;
      }
      .btn {
        padding: 5px 10px;
        margin-right: 5px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      .btn-update {
        background-color: #28a745;
        color: white;
      }
      .btn-delete {
        background-color: #dc3545;
        color: white;
      }
    </style>
</head>
<body>
<nav>
  <div class="brand">QuickCare</div>
  <div class="nav-links">
    <a th:href="@{/HospitalsList}">Hospitals</a>
    <a th:href="@{/DoctorsList}">Doctors</a>
    <a th:href="@{/usersList}">Users</a>
    <a th:href="@{/Adminhome}">Home</a>
    <a th:href="@{/logout}" class="logout">Logout</a>
  </div>
</nav>

<div class="main-content section">
  <h2>🏥 Hospitals List</h2>
  <table>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Address</th>
      <th>Availability</th>
      <th>Phone</th>
      <th>Facilities</th>
      <th>Actions</th>
    </tr>
    <tr th:each="hospital : ${hospitals}">
      <td th:text="${hospital.hospital_id}"></td>
      <td th:text="${hospital.hospital_name}"></td>
      <td th:text="${hospital.hospital_address}"></td>
      <td th:text="${hospital.hospital_availability}"></td>
      <td th:text="${hospital.hospital_phone}"></td>
      <td th:text="${hospital.hospital_facilities}"></td>
      <td>
		<a th:href="@{'/hospital/update/' + ${hospital.hospital_id}}">Update</a> |
        <a th:href="@{'/hospital/delete/' + ${hospital.hospital_id}}">Delete</a>
      </td>
    </tr>
  </table>
</div>
</body>
</html>
