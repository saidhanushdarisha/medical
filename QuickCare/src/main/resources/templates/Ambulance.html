<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Ambulance Booking</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f9ff;
      margin: 0;
    }

    nav {
      background-color: #007bff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
    }

    .brand {
      font-size: 1.5rem;
      font-weight: bold;
      color: white;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      margin: 0 1rem;
      font-weight: 500;
    }

    .logout {
      color: white;
      text-decoration: none;
      margin-left: 1rem;
      font-weight: 500;
      background-color: #FF0000;
      padding: 0.4rem 0.8rem;
      border-radius: 5px;
      transition: font-weight 0.2s, background-color 0.3s;
    }

    .logout:hover {
      font-weight: 700;
      background-color: #cc0000;
    }

    .container {
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .form-card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      width: 450px;
    }

    .form-card h2 {
      text-align: center;
      color: #007bff;
      margin-bottom: 25px;
    }

    input,
    select {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      margin-bottom: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

<!-- ✅ Unified Navbar -->
<nav>
  <div class="brand">QuickCare</div>
  <div class="nav-links">
    <a th:href="@{/getHospitals}">Hospitals</a>
    <a th:href="@{/getDoctors}">Doctors</a>
    <a th:href="@{/opbooking}">OP Booking</a>
    <a th:href="@{/Ambulance}">Ambulance</a>
    <a th:href="@{/Medicines}">Medicines</a>
    <a th:href="@{/ordersHistory}">Tracking</a>
    <a th:href="@{/logout}" class="logout">Logout</a>
  </div>
</nav>

<div class="container">
  <form th:action="@{/bookings/ambulancebooking/save}" method="post" class="form-card">
    <h2>🚑 Ambulance Booking</h2>

    <input type="text" name="hospitalName" placeholder="Hospital Name" required />
    <input type="text" name="patientName" placeholder="Patient Name" required />
    <input type="text" name="pickupLocation" placeholder="Pickup Location" required />
    <input type="text" name="destinationLocation" placeholder="Destination Location" required />
    <input type="text" name="contactNumber" placeholder="Contact Number" required />
    <input type="datetime-local" name="bookingDateTime" required />
    <select name="ambulanceType" required>
      <option value="">-- Select Ambulance Type --</option>
      <option value="Basic Life Support">Basic Life Support</option>
      <option value="Advanced Life Support">Advanced Life Support</option>
      <option value="Patient Transport Vehicle">Patient Transport Vehicle</option>
    </select>

    <button type="submit">Book Ambulance</button>
  </form>
</div>

</body>
</html>
