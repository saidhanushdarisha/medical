<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Medicine Booking</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background-color: #f4f9ff;
    }

    nav {
      background-color: #007bff;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      color: white;
      font-size: 1.5rem;
      font-weight: bold;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      margin: 0 1rem;
      font-weight: 500;
    }

    .logout {
      color: white;
      text-decoration: none;
      font-weight: 500;
      background-color: #FF0000;
      padding: 0.4rem 0.8rem;
      border-radius: 5px;
      margin-left: 1rem;
      transition: font-weight 0.2s, background-color 0.3s;
    }

    .logout:hover {
      font-weight: 700;
      background-color: #cc0000;
    }

    .container {
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .form-card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      width: 500px;
    }

    .form-card h2 {
      text-align: center;
      color: #007bff;
      margin-bottom: 25px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      margin-bottom: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    label {
      font-weight: 500;
      margin-top: 10px;
      display: block;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

<!-- ✅ Unified Navbar -->
<nav>
  <div class="brand"> QuickCare</div>
  <div class="nav-links">
    <a th:href="@{/getHospitals}">Hospitals</a>
    <a th:href="@{/getDoctors}">Doctors</a>
    <a th:href="@{/opbooking}">OP Booking</a>
    <a th:href="@{/Ambulance}">Ambulance</a>
    <a th:href="@{/Medicines}">Medicines</a>
    <a th:href="@{/ordersHistory}">Tracking</a>
    <a th:href="@{/logout}" class="logout">Logout</a>
  </div>
</nav>

<div class="container">
  <form th:action="@{/bookings/Medicinesbooking/save}" method="post" enctype="multipart/form-data" class="form-card">
    <h2>💊 Medicine Booking</h2>

    <input type="text" name="patientName" placeholder="Full Name" required>
    <input type="text" name="contactNumber" placeholder="Contact Number" required>
    <input type="text" name="address" placeholder="Delivery Address" required>
    <input type="text" name="medicineNames" placeholder="Medicine Names (comma-separated)" required>
    <input type="number" name="quantity" placeholder="Total Quantity" required>
    <input type="date" name="deliveryDate" required>
    <input type="time" name="deliveryTime" required>

    <label for="prescription">Upload Doctor Prescription (optional):</label>
    <input type="file" name="prescriptionFile">

    <button type="submit">Book Medicines</button>
  </form>
</div>

</body>
</html>
