<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>OP Appointment Booking</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f9ff;
      margin: 0;
    }

    nav {
      background-color: #007bff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
    }

    .brand {
      font-size: 1.5rem;
      font-weight: bold;
      color: white;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      margin: 0 1rem;
      font-weight: 500;
    }

    .logout {
      color: white;
      text-decoration: none;
      margin-left: 1rem;
      font-weight: 500;
      background-color: #FF0000;
      padding: 0.4rem 0.8rem;
      border-radius: 5px;
      transition: font-weight 0.2s, background-color 0.3s;
    }

    .logout:hover {
      font-weight: 700;
      background-color: #cc0000;
    }

    .container {
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .form-card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      width: 400px;
    }

    .form-card h2 {
      text-align: center;
      color: #007bff;
      margin-bottom: 25px;
    }

    input,
    select {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      margin-bottom: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <!-- ✅ Modern Unified Navbar -->
  <nav>
    <div class="brand">QuickCare</div>
    <div class="nav-links">
      <a th:href="@{/getHospitals}">Hospitals</a>
      <a th:href="@{/getDoctors}">Doctors</a>
      <a th:href="@{/opbooking}">OP Booking</a>
      <a th:href="@{/Ambulance}">Ambulance</a>
      <a th:href="@{/Medicines}">Medicines</a>
      <a th:href="@{/ordersHistory}">Tracking</a>
      <a th:href="@{/logout}" class="logout">Logout</a>
    </div>
  </nav>

  <div class="container">
    <form th:action="@{/bookings/opbooking/save}" method="post" class="form-card">
      <h2>🩺 OP Appointment Booking</h2>
      <input type="text" name="hospitalName" placeholder="Enter Hospital Name" required />
      <input type="text" name="doctorName" placeholder="Enter Doctor Name" required />
      <input type="text" name="location" placeholder="Enter Location" required />
      <input type="text" name="address" placeholder="Enter your Address" required />
      <input type="text" name="fullName" placeholder="Full Name" required />
      <input type="number" name="age" placeholder="Age" required />
      <input type="date" name="appointmentDate" required />
      <select name="timeSlot" required>
        <option value="">-- Select Time Slot --</option>
        <option>9:00 AM - 11:00 AM</option>
        <option>11:00 AM - 1:00 PM</option>
        <option>2:00 PM - 4:00 PM</option>
        <option>4:00 PM - 6:00 PM</option>
      </select>
      <button type="submit">Book Appointment</button>
    </form>
  </div>

</body>
</html>
