<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Doctor Appointment Booking</title>
    <style>
        .card {
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 20px;
            margin: 20px;
            width: 300px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            display: inline-block;
            vertical-align: top;
        }
        .card h3 {
            color: #007bff;
        }
        .card form input, .card form button {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
        }
        .card form input[type="text"], input[type="tel"], input[type="date"] {
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        .card form button {
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
	<h2>Book an Appointment</h2>

	<div class="card">
	    <h3 th:text="${doctor.doctor_name}">Doctor Name</h3>
	    <p><strong>Specialization:</strong> <span th:text="${doctor.doctor_specialization}"></span></p>
	    <p><strong>Hospital:</strong> <span th:text="${doctor.doctor_hospital}"></span></p>
	    <p><strong>Availability:</strong> <span th:text="${doctor.doctor_availability}"></span></p>

	    <form th:action="@{/bookings/doctorAppointment/save}" method="post">
	        <!-- Hidden doctor details -->
	        <input type="hidden" name="doctorName" th:value="${doctor.doctor_name}" />
	        <input type="hidden" name="specialization" th:value="${doctor.doctor_specialization}" />
	        <input type="hidden" name="hospital" th:value="${doctor.doctor_hospital}" />
	        <input type="hidden" name="availability" th:value="${doctor.doctor_availability}" />

	        <!-- User input fields -->
	        <label>Your Name:</label>
	        <input type="text" name="patientName" required><br>

	        <label>Contact Number:</label>
	        <input type="tel" name="contactNumber" required><br>

	        <label>Appointment Date:</label>
	        <input type="date" name="appointmentDate" required><br>

	        <button type="submit">Confirm Booking</button>
	    </form>
	</div>
	</body>
</html>
