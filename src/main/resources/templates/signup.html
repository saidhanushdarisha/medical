<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sign Up</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f9fc;
            margin: 0;
        }

        .navbar {
            background-color: #007bff;
            padding: 1em;
            color: white;
            display: flex;
            justify-content: space-between;
        }

        .navbar a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }

        .container {
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        }

        .container h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #007bff;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background-color: #0056b3;
        }

        .login-link {
            text-align: center;
            margin-top: 15px;
        }

        .login-link a {
            color: #007bff;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div><strong> QuickCare</strong></div>
    <div>
        
    </div>
</div>

<div class="container">
    <h2>Sign Up</h2>
    <form th:action="@{/signup}" th:object="${user}" method="post">
        <div class="form-group">
            <label for="userName">Full Name</label>
            <input type="text" id="userName" th:field="*{userName}" required />
        </div>

        <div class="form-group">
            <label for="userEmail">Email</label>
            <input type="email" id="userEmail" th:field="*{userEmail}" required />
        </div>

        <div class="form-group">
            <label for="userPassword">Password</label>
            <input type="password" id="userPassword" th:field="*{userPassword}" required />
        </div>

        <button type="submit">Register</button>
    </form>

    <div class="login-link">
        Already have an account? <a th:href="@{/}">Login</a>
    </div>
</div>

</body>
</html>
